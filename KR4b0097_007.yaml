body:
  text: 卷七難自然好學論一首夫民之性好安而惡危好逸而惡勞故不擾則其願得不逼則其志從洪荒之世大朴未虧君無文於上民無競於下物全理順莫不自得飽則安寢饑則求食怡然鼓腹不知為至德之世也若此則安知仁義之端禮律之文及至人不存大道陵遲乃始作文墨以傳其意區別群物使有類族造立仁義以嬰其心制其名分以檢其外勸學講文以神其教故六經紛錯百家繁熾開榮利之塗故奔騖而不覺是以貪生之禽食園池之粱菽求安之士乃詭志以從俗操筆執觚足容蘇息積學明經以代稼穡是以困而後學學以致榮計而後習好而習成有似自然故令吾子謂之自然耳推其原也六經以抑引為主人性以從欲為歡抑引則違其願從欲則得自然然則自然之得不由抑引之六經全性之本不須犯情之禮律故仁義務於理偽非養真之要術廉讓生於爭奪非自然之所出也由是言之則鳥不毀以求馴獸不群而求畜則人之真性無為正當自然耽此禮學矣論又云嘉肴珍膳雖所未嘗嘗必美之適於口也處在闇室覩烝燭之光不教而悅得於心況以長夜之冥得照太陽情變鬱陶而發其蒙雖事以末來情以本應則無損於自然好學難曰夫口之於甘苦身之於痛癢感物而動應事而作不須學而後能不待借而後有此必然之理吾所不易也今子以必然之理喻未必然之好學則恐似是而非之議學如一粟之論於是乎在也今子立六經以為準仰仁義以為主以規矩為軒駕以講誨為哺乳由其塗則通乖其路則滯遊心極視不覩其外終年馳騁思不出位聚族獻議唯學為貴執書擿句俛仰咨嗟使服膺其言以為榮華故吾子謂六經為太陽不學為長夜耳今若以堂為丙舍以誦諷為鬼語以六經為蕪穢以仁義為臭腐覩文籍則目瞧脩揖讓則變傴襲章服則轉筋譚禮典則齒齲於是兼而棄之與萬物為更始則吾子雖好學不倦猶將闕焉則向之不學未必為長夜六經未必為太陽也俗語曰乞兒不辱馬醫若遇上古無文之治可不學而獲安不勤而得志則何求於六經何欲於仁義哉以此言之則今之學者豈不先計而後學苟計而後動則非自然之應也子之云云恐故得菖蒲葅耳
