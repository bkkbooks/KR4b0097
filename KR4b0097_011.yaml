body:
  text: 附録四言詩泆泆白雲順風而回淵淵緑水盈坎而頽乘流遠逝自躬蘭隈杖策答諸納之素懷長嘯清原惟以告哀眇眇翔鸞舒翼太清俯眺紫辰仰看素庭淩躡玄虛浮沈無形將遊區外嘯侶長鳴神不存誰與獨征有舟浮覆紼纚是維栝楫松櫂有若龍微津經險越濟不歸思友長林抱朴山嵋守器殉業不能奮飛羽化華嶽超遊清霄雲蓋習習六龍飄飄左佩椒桂右綴蘭苕淩陽讚路王子奉軺婉孌名山真人是要齊物養生與道逍遙五言詩三首人生譬朝露世變多百羅苟必有終極彭聃不足多仁義澆淳朴前識喪道華留弱喪自然天真難可和郢人審匠石鍾子識伯牙真人不屢存高唱誰當和修夜家無為獨步光庭側仰首看天衢流光曜八極撫心悼季世遙念大道逼飄飄當路士悠悠進自棘得失自己來榮辱相蠶食朱紫雖玄黃太素貴無色淵淡體至道色化同消息俗人不可親松喬是可鄰何為穢濁間動搖增垢塵慷慨之遠遊整駕俟良辰輕舉翔區外濯翼扶桑津徘徊戲靈嶽彈琴詠泰真滄水澡五藏變化忽若神姮娥進妙藥毛羽翕光新一縱發開陽俯視當路人哀哉世間人何足久託身遊仙詩翩翩鳳轄逢此網羅太平廣記四百引續齊諧記酒賦重酎至清淵凝冰潔滋液兼備芬芳澄徹北堂書鈔一百四十八琴讚懿吾雅器載璞靈山體具德真清和自然澡以春雪淡若洞泉溫乎其仁玉潤外鮮昔在黃農神物以臻穆穆重華託心五絃間邪納正亹亹其仙宣和養氣介乃遐年北堂書鈔一百九
