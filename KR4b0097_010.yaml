body:
  text: 卷十太師箴浩浩太素陽曜陰凝二儀陶化人倫肇興厥初冥昧不慮不營欲以物開患以事成犯機觸害智不救生宗長歸仁自然之情故君道自然必託賢明茫茫在昔罔或不寧赫胥既往紹以皇羲默靜無文大朴未虧萬物熙熙不夭不離爰及唐虞猶篤其緒體資易簡應天順矩絺褐其裳土木其宇物或失性懼若在予疇咨熙載終禪舜禹夫統之者勞仰之者逸至人重身棄而不恤故子州稱疚石戶乘桴許由鞠躬辭長九州先王仁愛愍世憂時哀萬物之將頹然後莅之下逮德衰大道沉淪智惠日用漸私其親懼物乖離攘臂立仁利巧愈競繁禮屢陳刑教爭施夭性喪真季世陵遟繼體承資憑尊恃勢不友不師宰割天下以奉其私故君位益侈臣路生心竭智謀國不吝灰沉賞罰雖存莫勸莫禁若乃驕盈肆志阻兵擅權矜威縱虐禍崇丘山刑本懲暴今以脅賢昔為天下今為一身下疾其上君猜其臣喪亂弘多國乃隕顛故殷辛不道首綴素旗周朝敗度彘人是謀楚靈極暴乾溪潰叛晉厲殘虐欒書作難主父棄禮鷇胎不宰秦皇荼毒禍流四海是以亡國繼踵古今相承醜彼摧滅而襲其亡徵初安若山後敗如崩臨刃振鋒悔何所增故居帝王者無曰我尊慢爾德音無曰我強肆于驕淫棄彼佞倖納此遌顏諛言順耳染德生患悠悠庶類我控我告唯賢是授何必親戚順乃造好民實胥效治亂之原豈無昌教穆穆天子思問其愆虛心導人允求讜言師臣司訓敢告在前家誡人無志非人也但君子用心所欲準行自當量其善者必擬議而後動若志之所之則口與心誓守死無二恥躬不逮期於必濟若心疲體解或牽於外物或累於內欲不堪近患不忍小情則議於去就議於去就則二心交爭二心交爭則向所以見役之情勝矣或有中道而廢或有不成一匱而敗之以之守則不固以之攻則怯弱與之誓則多違與之謀則善泄臨樂則肆情處逸則極意故雖繁華熠燿無結秀之勳終年之勤無一旦之功斯君子所以歎息也若夫申胥之長吟夷齊之全潔展季之執信蘇武之守節可謂固矣故以無心守之安而體之若自然也乃是守志之盛者耳所居長吏但宜敬之而已矣不當極親密不宜數往往當有時其有眾人又不當獨在後又不當宿所以然者長吏喜問外事或時發舉則怨者謂人所說無以自免也宏行寡言慎備自守則怨責之路解矣其立身當清遠若有煩辱欲人之盡命託人之請求當謙言辭謝其素不預此輩事當相亮耳若有怨急心所不忍可外違拒密為濟之所以然者上遠宜適之幾中絕常人淫輩之求下全束脩無玷之稱此又秉志之一隅也凡行事先自審其可若於宜宜行此事而人欲易之當說宜易之理若使彼語殊佳者勿羞折遂非也若其理不足而更以情求來守人雖復云云當堅執所守此又秉志之一隅也不須行小小束脩之意氣若見窮乏而有可以賑濟者便見義而作若人從我有所求欲者先自思省若有所損廢多於今日所濟之義少則當權其輕重而拒之雖復守辱不已猶當絕之然大率人之告求皆彼無我有故來求我此為與之多也自不如此而為輕竭不忍面言強副小情未為有志也夫言語君子之機機動物應則是非之形著矣故不可不慎若於意不善了而本意欲言則當懼有不了之失且權忍之後視向不言此事無他不可則向言或有不可然則能不言全得其可矣且俗人傳吉遲傳凶疾又好議人之過闕此常人之議也坐中所言自非高議但是動靜消息小小異同但當高視不足和答也非義不言詳靜敬道豈非寡悔之謂人有相與變爭未知得失所在慎勿預也且默以觀之其是非行自可見或有小是不足是小非不是非至竟可不言以待之就有人問者猶當辭以不解近論議亦然若會酒坐見人爭語其形勢似欲轉盛便當無何舍去之此將鬭之兆也坐視必見曲直黨不能不有言有言必是在一人其不是者方自謂為直則謂曲我者有私於彼便怨惡之情生矣或便獲悖辱之言正坐視之大見是非而爭不了則仁而無武於義無可故當遠之也然大都爭訟者小人耳正復有是非共濟汗漫雖勝可足稱哉就不得遠取醉為佳若意中偶有所諱而彼必欲知者若守大不已或劫以鄙情不可憚此小輩而為所挽引以盡其言今正堅語不知不識方為有志耳自非知舊鄰比庶幾已下欲請呼者當辭以他故勿往也外榮華則少欲自非至急終無求欲上美也不須作小小卑恭當大謙裕不須作小小廉恥當全大讓若臨朝讓官臨義讓生若孔文舉求代兄死此忠臣烈士之節凡人自有公私慎勿強知人知彼知我知之則有忌於我今知而不言則便是不知矣若見竊語私議便舍起勿使忌人也或時逼迫強與我共說若其言邪險則當正色以道義正之何者君子不容偽薄之言故也一旦事敗便言某甲昔知吾事是以宜備之深也凡人私語無所不有宜預以為意見之而走者何哉或偶知其私事與同則可不同則彼恐事泄思害人以滅迹也非意所欽者而來戲調蚩笑人之闕者但莫應從小共轉至於不共而勿大冰矜趨以不言答之勢不得久行自止也自非所監臨相與無他宜適有壺榼之意束脩之好此人道所通不須逆也過此以往自非通穆匹帛之饋車服之贈當深絕之何者常人皆薄義而重利今以自竭者必有為而作鬻貨徼歡施而求報其俗人之所甘願而君子之所大惡也又憒不須離摟強勸人酒不飲自已若人來勸己輒當為持之勿誚勿逆也見醉薰薰便止慎不當至困醉不能自裁也
