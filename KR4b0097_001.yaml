body:
  text: 卷一兄秀才公穆入軍贈詩十九首兄秀才公穆入軍贈詩十九首雙鸞匿景曜戢翼太山崖抗首漱朝露晞陽振羽儀長鳴戲雲中時下息蘭池自謂絶塵埃終始永不虧何意世多艱虞人來我疑雲網塞四區高羅正參差奮迅勢不便六翮無所施隱姿就長纓卒為時所羈單雄翻孤逝哀吟傷生離徘徊戀儔侶慷慨高山陂鳥盡良弓藏謀極身必危吉凶雖在己世路多嶮巇安得反初服抱玉寶六奇逍遙遊太清攜手長相隨鴛鴦于飛肅肅其羽朝遊高原夕宿蘭渚雍雍和鳴顧眄儔侶俯仰慷慨優游容與鴛鴦于飛嘯侶命儔朝遊高原夕宿中洲交頸振翼容與清流咀嚼蘭蕙俯仰優游泳彼長川言息其滸陟彼高岡言刈其楚嗟我征邁獨行踽踽仰彼凱風涕泣如雨泳彼長川言息其沚陟彼高岡言刈其杞嗟我獨征靡瞻靡恃仰彼凱風載坐載起穆穆惠風扇彼輕塵奕奕素波轉此游鱗伊我之勞有懷佳人寤言永思實鍾所親所親安在舍我遠邁棄此蓀芷襲彼蕭艾雖曰幽深豈無顛沛言念君子不遐有害人生壽促天地長久百年之期孰云其壽思欲登仙以濟不朽攬轡踟蹰仰顧我友我友焉之隔茲山岡誰謂河廣一葦可航徒恨永離逝彼路長瞻仰弗及徙倚倣徨良馬既間麗服有暉左攬繁弱右接忘歸風馳電逝躡景追飛淩厲中原顧眄生姿攜我好仇載我輕車南淩長阜北厲清渠仰落驚鴻俯引淵魚盤于遊畋其樂只且淩高遠眄俯仰咨嗟怨彼幽縶邈爾路遐雖有好音誰與清歌雖有姝顏誰與發華仰訊高雲俯託輕波乘流遠遁抱恨山阿輕車迅邁息彼長林春木載榮布葉垂陰習習谷風吹我素琴咬咬黃鳥顧儔弄音感寤馳情思我所欽心之憂矣永嘯長吟浩浩洪流帶我邦畿萋萋緑林奮榮揚暉魚龍瀺灂山鳥群飛駕言出遊日夕忘歸思我良朋如渴如饑願言不獲愴矣其悲息徒蘭圃秣馬華山流磻平皋垂綸長川目送歸鴻手揮五絃俯仰自得遊心太玄嘉彼釣叟得魚忘筌郢人逝矣誰可盡言間夜肅清朗月照軒微風動袿組帳高褰旨酒盈尊莫與交歡琴瑟在御誰與鼓彈仰慕同趣其馨若蘭佳人不存能不永歎乘風高遊遠登靈丘託好松喬攜手俱遊朝發太華夕宿神州彈琴詠詩聊以忘憂琴詩自樂遠遊可珍含道獨往棄智遺身寂乎無纍何求於人長寄靈嶽怡志養神流俗難悟逐物不還至人遠鑒歸之自然萬物為一四海同宅與彼共之豫何所惜生若浮寄暫見忽終世故紛紜棄之八成澤雉雖饑不願園林安能服御勞形苦心身貴名賤榮辱何在貴得肆志縱心無悔幽憤詩一首嗟余薄祜少遭不造哀煢靡識越在繈褓母兄鞠育有慈無威恃愛肆姐不訓不師爰及冠帶馮寵自放抗心希古任其所尚託好老莊賤物貴身志在守朴養素全真曰余不敏好善暗人子玉之敗屢增惟塵大人含弘藏垢懷恥民之多僻政不由己惟此褊心顯明臧否感悟思愆怛若創痏欲寡其過謗議沸騰性不傷物頻致怨憎昔慚柳惠今愧孫登內負宿心外恧良朋仰慕嚴鄭樂道間居與世無營神氣晏如咨豫不淑嬰纍多虞匪降自天實由頑疏理弊患結卒致囹圄對答鄙訊縶此幽阻實恥訟冤時不我與雖曰義直神辱志沮澡身滄浪豈云能補嗈嗈鳴雁奮翼北遊順時而動得意忘憂嗟我憤歎曾莫能儔事與願違遘茲淹留窮達有命亦又何求古人有言善莫近名奉時恭默咎悔不生萬石周慎安親保榮世務紛紜秖攪豫情安樂必誡乃終利貞煌煌靈芝一年三秀豫獨何為有志不就懲難思復心焉內疚庶勗將來無馨無臭采薇山阿散髮巖岫永嘯長吟頤性養壽述志詩二首潛龍育神軀濯鱗戲蘭池延頸慕大庭寢足俟皇羲慶雲未垂景盤桓朝陽陂悠悠非我匹疇肯應俗宜殊類難遍周鄙議紛流離轗軻丁悔吝雅志不得施耕耨感寧越馬席激張儀逝將離群侶杖策追洪崖焦鵬振六翮羅者安所羈浮遊太清中更求新相知比翼翔雲漢飲露餐瓊枝多念世間人夙駕咸驅馳沖靜得自然榮華何足為斥鷃檀蒿林仰笑神鳳飛坎井蝤蛭宅神龜安所歸恨自用身拙任意多永思遠實與世殊義譽非所希往事既已謬來者猶可追何為人事間自令心不夷慷慨思古人夢想見容輝願與知己遇舒憤啓其微巖穴多隱逸輕舉求吾師晨登箕山巔日夕不知饑玄居養營魄千載長自綏遊仙詩一首遙望山上松隆谷鬱青葱自遇一何高獨立迥無雙願想遊其下蹊路絶不通王喬棄我去乘雲駕六龍飄颻戲玄圃黃老路相逢授我自然道曠若發童蒙採藥鍾山隅服食改姿容蟬蛻棄穢纍結友家板桐臨觴奏九韶雅歌何雍雍長與俗人別誰能覩其蹤六言十首六言十首惟上古堯舜二人功德齊均不以天下私親高尚簡朴慈順寧濟四海蒸民唐虞世道治萬國穆親無事賢愚各自得志晏然逸豫內忘佳哉爾時可喜知慧用有為法令滋章寇生紛然相召不停大人玄寂無聲鎮之以靜自正名與身孰親哀哉世俗殉榮馳騖竭力喪精得失相紛憂驚自是勤苦不寧生生厚招咎金玉滿堂莫守古人安此粗醜獨以道德為友故能延期不朽名行顯患滋位高勢重禍基美色伐性不疑厚味臘毒難治如何貪人不思東方朔至清外似貪汙內貞穢身滑稽隱名不為世纍所攖所欲不足無營楚子文善仕三為令尹不喜柳下降身蒙恥不以爵祿為己靜恭古惟二子老萊妻賢名不願夫子相荊相將避祿隱耕樂道間居採萍終厲高節不傾嗟古賢原憲棄背膏梁朱顏樂此屢空饑寒形陋體逸心寬得志一世無患重作四言詩七首一作秋胡行重作四言詩七首富貴尊榮憂患諒獨多富貴尊榮憂患諒獨多古人所懼豐屋蔀家人害其上獸惡網羅惟有貧賤可以無他歌以言之富貴憂患多貧賤易居貴盛難為工貧賤易居貴盛難為工恥接直言與禍相逢變故萬端俾吉作凶思牽黃犬其計莫從歌以言之貴盛難為工勞謙寡悔忠信可久安勞謙寡悔忠信可久安天道害盈好勝者殘彊梁致災多事招患欲得安樂獨有無愆歌以言之忠信可久安役神者弊極欲疾枯役神者弊極欲疾枯顏回短折下及童烏縱體淫恣莫不早徂酒色何物今自不辜歌以言之酒色令人枯絶智棄學遊心於玄默絶聖棄學遊心於玄默遇過而悔當不自得垂釣一壑所樂一國被髮行歌和者四塞歌以言之遊心於玄默思與王喬乘雲遊八極思與王喬乘雲遊八極淩厲五嶽忽行萬億授我神藥自生羽翼呼吸太和練形易色歌以言之思行遊八極徘徊鍾山息駕於層城徘徊鍾山息駕於層城上蔭華蓋下采若英受道王母遂升紫庭逍遙天衢千載長生歌以言之徘徊於層城思親詩一首奈何愁兮愁無聊恆惻惻兮心若抽愁奈何兮悲思多情鬱結兮不可化奄失恃兮孤煢煢內自悼兮啼失聲思報德兮邈已絶感鞠育兮情剝裂嗟母兄兮永潛藏想形容兮內摧傷感陽春兮思慈親欲一見兮路無因望南山兮發哀歎感機杖兮涕汍瀾念疇昔兮母兄在心逸豫兮壽四海忽已逝兮不可追心窮約兮但有悲上空堂兮廓無依覩遺物兮心崩摧中夜悲兮當誰告獨抆淚兮抱哀戚日遠邁兮思豫心戀所生兮淚不禁慈母沒兮誰豫驕顧自憐兮心忉忉訴蒼天兮天不聞淚如雨兮歎青雲欲棄憂兮尋復來痛殷殷兮不可裁答二郭三首天下悠悠者下京趨上京二郭懷不群超然來北征樂道託萊廬雅志無所營良時遘其願遂結歡愛情君子義是親恩好篤平生寡志自生災屢使衆釁成豫子匿梁側聶政變其形顧此懷怛惕慮在苟自寧今當寄他域嚴駕不得停本圖終宴婉今更不克并二子贈嘉詩馥如幽蘭馨戀土思所親能不氣憤盈昔蒙父兄祚少得離負荷因疏遂成懶寢跡北山阿但願養性命終己靡有他良辰不我期當年值紛華坎壈趣世教常恐嬰網羅羲農邈已遠拊膺獨咨嗟朔戒貴尚容漁父好揚波雖逸亦以難非余心所嘉豈若翔區外餐瓊漱朝霞遺物棄鄙纍逍遙遊太和結友集靈嶽彈琴登清歌有能從此者古人何足多詳觀淩世務屯險多憂虞施報更相市大道匿不舒夷路值枳棘安步將焉如權智相傾奪名位不可居鸞鳳避罻羅遠託崑崙墟莊周悼靈龜越稷嗟王輿至人存諸己隱朴樂玄虛功名何足殉乃欲列簡書所好亮若茲楊氏歎交衢去去從所志敢謝道不俱與阮德如一首與阮德如一首含哀還舊廬感切傷心肝良時遘數子談慰臭如蘭疇昔恨不早既面侔舊歡不悟卒永離念隔悵憂歎事故無不有別易會良難郢人忽已逝匠石寢不言澤雉窮野草靈龜樂泥蟠榮名穢人身高位多災患未若捐外纍肆志養浩然顏氏希有虞隰子慕黃軒涓彭獨何人唯志在所安漸漬殉近欲一往不可攀生生在豫積勿以怵自寬南土旱不涼襟計宜早完君其愛德素行路慎風寒自力致所懷臨文情辛酸酒會詩七首酒會詩七首樂哉苑中遊周覽無窮已百卉吐芳華崇基邈高跱林木紛交錯玄池戲魴鯉輕丸斃翔禽纖綸出鱣鮪坐中發美讚異氣同音軌臨川獻清酤微歌發皓齒素琴揮雅操清聲隨風起斯會豈不樂恨無東野子酒中念幽人守故彌終始但當體七絃寄心在知己淡淡流水淪胥而逝泛泛柏舟載浮載滯微嘯清風鼓楫容裔放櫂投竿優游卒歲婉彼鴛鴦戢翼而遊俯唼緑藻託身洪流朝翔素瀨夕棲靈洲搖蕩清波與之沉浮藻泛蘭池和聲激朗操縵清商遊心大象傾昧修身惠音遺響鍾期不存我志誰賞斂絃散思遊釣九淵重流千仞或餌者懸猗與莊老棲遲永年實惟龍化蕩志浩然肅肅泠風分生江湄卻背華林俯泝丹坻含陽吐英履霜不衰嗟我殊觀百卉俱腓心之憂矣孰識玄機猗猗蘭藹殖彼中原緑葉幽茂麗蕊濃繁馥馥蕙芳順風而宣將御椒房吐薰龍軒瞻彼秋草悵矣惟騫雜詩一首微風清扇雲氣四除皎皎亮月麗于高隅興命公子攜手同車龍驥翼翼揚鑣踟蹰肅肅宵征造我友廬光燈吐輝華幔長舒鸞觴酌醴神鼎烹魚絃超子野歎過綿駒流詠太素俯讚玄虛孰克英賢與爾剖符
