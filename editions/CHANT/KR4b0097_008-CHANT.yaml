body:
  text: 卷八難宅無吉凶攝生論一首夫神祗遐遠吉凶難明雖中人自竭莫得其端而易以惑道故夫子寢答於來問終慎神怪而不言是以古人顯仁於物藏用於身知其不可眾所共非故隱之彼非所明也吾無意於庶幾而足下師心陋見斷然不疑繫決如此足以獨斷思省來論旨多不通謹因來言以生此難方推金木未知所在莫有食治世無自理之道法無獨善之術苟非其人道不虛行禮樂政刑經常外事猶有所疏況乎幽微者耶縱欲辨明神微袪惑起滯立端以明所由斷以檢其要乃為有徵若但撮提群愚蠶種忿而棄之因謂無陰陽吉凶之理得無似噎而怨粒稼溺而責舟楫者耶論曰百年之宮不能令殤子壽孤逆魁岡不能令彭祖夭又曰許負之相條侯英布之黥而後王皆性命也應曰此為命有所定壽有所在禍不可以智逃福不可以力致英布畏痛卒罹刀鋸亞夫忌餒終有餓患萬事萬物凡所遭遇無非相命也然唐虞之世命何同延長平之卒命何同短此吾之所疑也即如所論雖慎若曾顏不得免禍惡若桀跖故當昌熾吉凶素定不可推移則古人何言積善之家必有餘慶履信思順自天祐之必積善而後福應信著而後祐來猶罪之招罰功之致賞也苟先積而後受報事理所得不為闇自遇之也若皆謂之是相此為決相命於行事定吉凶於知力恐非本論之意此又吾之所疑也又云多食不消必須黃丸苟命自當生多食何畏而服良藥若謂服藥是相之所一宅豈非是一耶若謂雖命猶當須藥以自濟何知相不須宅以自輔乎若謂藥可論而宅不可說恐天下或有說之者矣既曰壽夭不可求甚於貴賤而復曰善求壽強者必先知災疾之所自來然後可防也然則壽夭果可求耶不可求也既曰彭祖七百殤子之夭皆性命自然而復曰不知防疾致壽去夭求實於虛故性命不遂此為壽夭之來生於用身性命之遂得於善求然則夭短者何得不謂之愚壽延者何得不謂之智苟壽夭成於愚智則自然之命不可求之論奚所措之凡此數者亦雅論之矛楯矣論曰專氣致柔少私寡欲直行情性之所宜而合養生之正度求之於懷抱之內而得之矣又曰善養生者和為盡矣誠哉斯言匪謂不然但謂全生不盡此耳夫危邦不入所以避亂政之害重門擊柝所以備狂暴之災居必爽塏所以遠風毒之患凡事之在外能為害者此未足以盡其數也安在守一和而可以為盡乎夫專靜寡欲莫若單豹行年七十而有童孺之色可謂柔和之用矣而一旦為虎所食豈非恃內忽外耶若謂豹相正當給廚雖智不免則寡欲何益而云養生可得若單豹以未盡善而致災則輔生之道不止於一和苟和未足保生則外物之為患者吾未知其所齊矣論曰師占成居則有驗使造新則無徵請問占成居而有驗者為但占墻屋耶占居者之吉凶也若占居者而知盛衰此自占人非占成居也占成居而知吉凶此為宅自有善惡而居者從之故占者觀表而得內也苟宅能制人使從之則當吉之人受災於凶宅妖逆無道獲福於吉居爾為吉凶之致唯宅而已更令由人也新便無徵耶若吉凶故當由人則雖成居何得而云有驗耶若此果可占耶不可占耶果有宅耶其無宅也論曰宅猶卜筮可以知吉凶而不能為吉凶也應曰此相似而不同卜者吉凶無豫待物而應將來之兆也相宅不問居者之賢愚唯觀已然有傳者已成之形也猶覩龍顏而知當貴見縱理而知當餓然各有由不為闇中也今見其同於得吉凶因謂相宅與卜不異此猶見琴而謂之箜篌非但不知琴也縱如論宅與卜同但能知而不能為則吉凶已成雖知何益卜與不卜了無所在而古人將有為必曰問之龜筮吉以定所由差此豈徒也哉此復吾之所疑也武王營周則云考卜惟王宅是鎬京周公遷邑乃卜澗瀍終惟洛食又曰卜其宅兆而安厝之古人修之於昔如彼足下非之於今如此不知誰定可從論曰為三公宅而愚民必不為三公可知也或曰愚民必不得久居公侯宅然則果無宅也應曰不謂吉宅能獨成福但謂君子既有賢才又卜其居順履積德乃享元吉猶夫良農既懷善藝又擇沃土復加耘耔乃有盈倉之報耳今見愚民不能得福於吉居便謂宅無善惡何異覩種田之無十千而謂田無壤塉耶良田雖美而稼不獨茂卜宅雖吉而功不獨成相須之理誠然則宅之吉凶未可惑也今信徵祥則棄人理之所宜守卜相則絕陰陽之吉凶持知力則忘天道之所存此何異識時雨之生物因垂拱而望嘉穀乎是故疑怪之論生偏是之議興所託不一烏能相通若夫兼而善之者得無半非冢宅耶論曰時日譴祟古盛王無之季王之所好聽此言善矣顧其不盡然湯禱桑林周公秉圭不知是譴祟非也吉日惟戊既伯既禱不知是時日非也此皆足下家事先師所立而一朝背之必若湯周未為盛王幸更詳之又當校知二賢何如足下耶論曰賊方至以疾走為務食不消以黃丸為先子徒知此為賢於安須臾與求乞胡而不知制賊病於無形事功幽而無跌也夫救火以水雖自多於抱薪而不知曲突之先物矣況乎天下微事言所不能及數所不能分是以古人存而不論神而明之遂知來物故能獨觀於萬化之前收功於大順之後百姓謂之自然而不知所以然若此豈常理之所逮耶今形象著明有數者猶尚滯之天地廣遠品物多方智之所知未若所不知者眾也今執辟穀之術謂養生已備至理已盡馳心極觀齊此而還意所不及皆謂無之欲據所見以定古人之所難言得無似蟪蛄之議冰耶欲以所識而之所棄得無似戎人問布於中國覩麻種而不事耶吾怯於專斷進不敢定禍福於卜相退不敢謂家無吉凶也
