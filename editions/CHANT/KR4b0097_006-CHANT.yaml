body:
  text: 卷六釋私論一首夫稱君子者心無措乎是非而行不違乎道者也何以言之夫氣靜神虛者心不存於矜尚體亮心達者情不繫於所欲矜尚不存乎心故能越名教而任自然情不繫於所欲故能審貴賤而通物情物情順通故大道無違越名任心故是非無措也是故言君子則以無措為主以通物為美言小人則以匿情為非以違道為闕何者匿情矜𠫤小人之至惡虛心無措君子之篤行也是以大道言及吾無身吾又何患無以生為貴者是賢於貴生也由斯而言夫至人之用心固不存有措矣是故伊尹不惜賢於殷湯故世濟而名顯周旦不顧嫌而隱行故假攝而化隆夷吾不匿情於齊桓故國霸而主尊其用心豈為身而繫乎私哉故管子曰君子行道忘其為身斯言是矣君子之行賢也不察於有度而後行也任心無邪不議於善而後正也顯情無措不論於是而後為也是故傲然忘賢而賢與度會忽然任心而心與善遇儻然無措而事與是俱也故論公私者雖云志道存善無凶邪無所懷而不匿者不可謂無私雖欲之伐善情之違道無所抱而不顯者不可謂不公今執必公之理以繩不公之情使夫雖為善者不離於有私雖欲之伐善不陷於不公重其名而貴其心則是非之情不得不顯矣是非必顯有善者無匿情之不是有非者不加不公之大非無不是則善莫不得無大非則莫過其非乃所以救其非也非徒盡善亦所以厲不善也夫善以盡善非以救非而況乎以是非之至者故善之與不善物之至者也若處二物之間所往者必以公成而私敗同用一器而有成有敗夫公私者成敗之途而吉凶之門乎故物至而不移者寡不至而在用者眾若質乎中人之體運乎在用之質而栖心古烈擬足公塗值心而言則言無不是觸情而行則事無不吉於是乎同之所措者乃非所措也欲之所私者乃非所私也言不計乎得失而遇善行不準乎是非而遇吉豈公成私敗之數乎夫如是也又何措之有哉故里鳧顯盜晉文愷悌勃鞮號罪忠立身存繆賢吐釁言納名稱漸離告誠一堂流涕然數子皆以投命之禍臨不測之機表露心識猶以安全況乎君子無彼人之罪而有其善乎措善之情其所病也唯病病是以不病病而能療亦賢於病矣然事亦有似非而非非類是而非是者不可不察也故變通之機或有矜以至讓貪以致廉愚以成智忍以濟仁然矜吝之時不可謂無廉猜忍之形不可謂無仁此似非而非非者也或讒言似信不可謂有誠激盜似忠不可謂無私此類是而非是也故乃論其用心定其所趣執其辭以準其理察其情以尋其變肆乎所始名其所終則夫行私之情不得因乎似非而容其非淑亮之心不得蹈乎似是而負其是故實是以暫非而後顯實非以暫是而後明公私交顯則行私者無所冀而淑亮者無所負矣行私者無所冀則思改其非立公者無所忌則行之無疑此大治之道也故主妾覆醴以罪受戮王陵庭爭而陳平順旨於是觀之非似非非者乎明君子之篤行顯公私之所在闔堂盈階莫不寓目而曰善人也然背顏退議而含私者不復同耳抱而匿情不改者誠神以喪於所惑而體以溺於常名心以制於所慴而情有繫於所欲咸自以為有是而莫賢乎己未有攻肌之慘駭心之禍遂莫能收情以自反棄名以任實乃心有是焉匿之以私志有善焉措之為惡不措所措而措所不措不求所以不措之理而求所以為措之道故明為措而闇於措是以不措為拙以致措為工唯懼隱之不微唯患匿之不密故有矜忤之容以觀常人矯飾之言以要俗譽謂永年良規莫盛於茲終日馳思莫闚其外故能成其私之體而喪其自然之質也於是隱匿之情必存乎心偽怠之機必形乎事若是則是非之議既明賞罰之實又篤不知冒廕之可以無景而患景之不匿不知無措之可以無患而患措之不以豈不哀哉是以申侯苟順取棄楚恭宰嚭耽私卒享其禍由是言之未有抱隱顧私而身立清世匿非藏情而信著明名者也君子既有其質又覩其鑒貴夫亮達布而存之惡夫矜吝棄而遠之所措一非而內愧乎神賤隱一闕而外慚其形言無苟諱而行無苟隱不以愛之而苟善不以惡之而苟非心無所矜而情無所繫體清神正而是非允當忠感明天子而信篤乎萬民寄胸懷於八荒垂坦蕩以永日斯非賢人君子高行之美異者乎或問曰第五倫有私乎哉曰昔吾兄子有疾吾一夕十往省而反寐自安吾子有疾終朝不往視而通夜不得眠若是可謂私乎非私也答曰是非也非私也夫私以不言為名公以盡言為稱善以無𠫤為體非以有措為負今第五倫顯情是無私也矜往不眠是有非也無私而有非者無措之志也夫言無措者不齊於必盡也言多吝者不具於不言而已故多吝有非無措有是然無措之所以有是以志無所尚心無所欲達乎大道之情動以自然則無道以至非也抱一而無措則無私無非兼有二義乃為絕美耳若非而能言者是賢於不言之私非無情以非之大者也今第五倫有非而能顯不可謂不公也所顯是非不可謂有措也有非而謂私不可謂不惑公私之理也管蔡論一首或問曰案記管蔡流言叛戾東都周公征討誅以凶逆頑惡顯著流名千載且明父聖兄曾不鑒凶愚於幼稚覺無良之子弟而乃使理亂殷之弊民顯榮爵於藩國使惡積罪成終遇禍害於理不通心無所安願聞其說答曰善哉子之問也昔文武之用管蔡以實周公之誅管蔡以權權事顯實理沉故令時人全謂管蔡為頑凶方為吾子論之夫管蔡皆服教殉義忠誠自然是以文王列而顯之發旦二聖舉而任之非以情親而相私也乃所以崇德禮賢濟殷弊民綏輔武庚以興頑俗功業有績故曠世不廢名冠當時列為藩臣逮至武卒嗣誦幼沖周公踐政率朝諸侯思光前載以隆王業而管蔡服教不達聖權卒遇大變不能自通忠於乃心思在王室遂乃抗言率眾欲除國患翼存天子甘心毀旦斯乃愚誠憤發所以徼禍也成王大悟周公顯復一化齊俗義以斷恩雖內信如心外體不立稱兵叛亂所惑者廣是以隱忍授刑流涕行誅示以賞罰不避親戚榮爵所顯必鍾盛德戮撻所施必加有罪斯乃為教之正體古今之明義也管蔡雖懷忠抱誠要為罪誅罪誅已顯不得復理內必幽伏罪惡遂章幽章之路大殊故令奕世未蒙發起然論者承名信行便以管蔡為惡不知管蔡之惡乃所以令三聖為不明也若三聖未為不明則聖不祐惡而任頑凶頑凶不容於明世則管蔡無取私於父兄而見任必以忠良則二叔故為淑善矣今若本三聖之用明思顯授之實理推忠賢之闇權論為國之大紀則二叔之良乃顯三聖之用也有以流言之故有緣周公之誅是矣且周公居攝邵公不悅推此言之則管蔡懷疑未為不賢而忠賢可不達權三聖未為用惡而周公不得不誅若此三聖所用信良周公之誅得宜管蔡之心見理爾乃大義得通外內兼敘無相伐負者則時論亦得釋然而大解也明膽論一首有呂子者精義味道研覈是非以為人有膽可無明有明便有膽矣嵇先生以為明膽殊用不能相生論曰夫元氣陶鑠眾生稟焉賦受有多少故才性有昏明唯至人特鍾純美兼周外內無不畢備降此已往蓋闕如也或明於見物或勇於決斷人情貪廉各有所止譬諸草木區以別矣兼之者博於物偏受者守其分故吾謂明膽異氣不能相生明以見物膽以決斷專明無膽則雖見不斷專膽無明則違理失機故子家軟弱陷於弒君左師不斷見逼華臣皆智及之而決不行也此理坦然非無疑滯故略舉一隅想不重疑呂子曰敬覽來論可謂海亦不加者矣折理貴約而盡情何尚浮穢而迂誕哉今子之論乃引渾元以為喻何遼遼而坦謾也故直答以人事之切要焉漢之賈生陳切直之策奮危言之至行之無疑明所察也忌鵩作賦暗所惑也一人之膽豈有盈縮乎蓋見與不見故行之有果否也子家左師皆愚惑淺弊明不徹達故惑於曖昧終丁禍害豈明見照察而膽不斷乎故霍光懷沉勇之氣履上將之任戰乎王賀之事延年文生夙無武稱陳義奮辭膽氣淩雲斯其驗歟及於期授首陵母伏劍明果之疇若此萬端欲詳而載之不可勝言也況有覩夷塗而無敢投足階雲路而疑於迄泰清者乎若愚弊之倫為能自託幽昧之中棄身陷穽之間如盜跖竄身於虎吻穿窬先首於溝瀆而暴虎憑河愚敢之類則能有之是以余謂明無膽無膽能偏守易了之理不在多喻故不遠引繁言若未反三隅猶復有疑思承後誨得一騁辭夫論理性情折引異同固當尋所受之終始推氣分之所由順端極末乃不悖耳今子欲棄置渾元捃摭所見此為好理網目而惡持綱領也本論二氣不同明不生膽欲極論之當令一人播無刺諷之膽而有見事之明故當有不果之害非中人血氣無之而復資之以明二氣存一體則明能運膽賈誼是也賈誼明膽自足相經故能濟事誰言殊無膽獨任明以行事者乎子獨自作此言以合其論也忌鵩闇惑明所不周何害於膽乎明既以見物膽能行之耳明所不見膽當何斷進退相扶可謂盈縮就如此言賈生陳策明所見也忌鵩作賦闇所惑也爾為明徹於前而闇惑於後明有盈縮也苟明有進退膽亦何為不可偏乎子然霍光有沉勇而戰於廢王此勇有所撓也而子言一人膽豈有盈縮此則是也賈生闇鵩明有所塞也光懼廢立勇有所撓也夫唯至明能無所惑至膽能無所虧耳自非若此誰無弊損乎但當總有無之大略而致論之耳夫物以實見為主延年奮發勇義凌雲此則膽也而云夙無武稱此為信宿稱而疑成事也延年處議明所見也壯氣騰厲勇之決也此足以觀矣子又曰言明無膽無膽能偏守案子之言此則有專膽之人亦為膽特自一氣矣五才存體各有所生明以陽曜膽以陰凝豈可為有陽而生陰可無陽耶雖相須以合德要自異氣也凡餘雜說於期陵母暴虎云云萬言致一欲以何明耶幸更詳思不為辭費而已矣
