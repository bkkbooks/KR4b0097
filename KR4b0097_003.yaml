body:
  text: 卷三卜疑集一首卜疑集一首有宏達先生者恢廓其度寂寥疏闊方而不制廉而不割超世獨步懷玉被褐交不苟合仕不期達常以為忠信篤敬直道而行之可以居九夷遊八蠻浮滄海踐河源甲兵不足忌猛獸不為患是以機心不存泊然純素從容縱肆遺忘好惡以天道為一指不識品物之細故也然而大道既隱智巧滋繁世俗膠加人情萬端利之所在若鳥之追鸞富為積蠹貴為聚怨動者多纍靜者鮮患爾乃思丘中之隱士樂川上之執竿也於是遠念長想超然自失郢人既沒誰為吾質聖人吾不得見冀聞之於數術乃適太史貞父之廬而訪之曰吾有所疑願子卜之貞父乃危坐操蓍拂几陳龜曰君何以命之先生曰吾寧發憤陳誠讜言帝庭不屈王公乎將卑懦委隨承旨倚靡為面從乎寧愷悌弘覆施而不德乎將進趣世利苟容偷合乎寧隱居行義推至誠乎將崇飾矯誣養虛名乎寧斥逐凶佞守正不傾明否臧乎將傲倪滑稽挾智任術為智囊乎寧與王喬赤松為侶乎將進伊摯而友尚父乎寧隱鱗藏彩若淵中之龍乎寧舒翼揚聲若雲間之鴻乎寧外化其形內隱其情屈身隨時陸沉無名雖在人間實處冥冥乎將激昂為清鋭思為精行與世異心與俗并所在必聞恆營營乎寧寥落間放無所矜尚彼我為一不爭不讓遊心皓素忽然坐忘追羲農而不及行中路而惆愴乎將慷慨以為壯感概為亮上干萬乘下凌將相尊嚴其容高自矯抗常如失職懷恨怏怏乎寧聚貨千億擊鍾鼎食枕藉芬芳婉孌美色乎將苦身竭力剪除荊棘山居谷飲倚巖而息乎寧如伯奮仲堪二八為偶排擯共鯀令失所乎將如箕山之夫潁水之父輕賤唐虞而笑大禹乎寧如泰伯之隱德潛讓而不揚乎將如季札之顯節義慕為子臧乎寧如老聃之清淨微妙守玄抱一乎將如莊周之齊物變化洞達而放逸乎寧如夷吾之不𠫤束縛而終立霸功乎將如魯連之輕世肆志高談從容乎寧如市南子之神勇內固山淵其志乎將如毛公藺生之龍驤虎步慕為壯士乎此誰得誰失何凶何吉時移俗易好貴慕名臧文不讓位於柳季公孫不歸美於董生賈誼一當於明主絳灌作色而揚聲況今千龍並馳萬驥俱征紛紜交競逝若流星敢不惟思謀於老成哉太史貞父曰吾聞至人不相達人不卜若先生者文明在中見素抱朴內不愧心外不負俗交不為利仕不謀祿鑒乎古今滌情蕩欲夫如是呂梁可以遊湯谷可以浴方將觀大鵬於南溟又何憂於人間之委曲養生論一首世或有謂神仙可以學得不死可以力致者或云上壽百二十古今所同過此以往莫非妖妄者此皆兩失其情請試粗論之夫神仙雖不目見然記籍所載前史所傳較而論之其有必矣似特受異氣稟之自然非積學所能致也至於導養得理以盡性命上獲千餘歲下可數百年可有之耳而世皆不精故莫能得之何以言之夫服藥求汗或有弗獲而愧情一集渙然流離終朝未餐則囂然思食而曾子銜哀七日不飢夜分而坐則低迷思寢內懷殷憂則達旦不暝徑刷理鬢醇醴發顏僅乃得之壯士之怒赫然殊觀植髮衝冠由此言之精神之於形骸猶國之有君也神躁於中而形喪於外猶君昏於上國亂於下也夫為稼於湯之世偏有一溉之功者雖終歸燋爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不棲於情憂喜不留於意泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫田種者一畝十斛謂之良田此天下之通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所共知也薰辛害目豚魚不養常世所識也蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使暗而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察惟五穀是見聲色是耽目惑玄黃耳務淫哇滋味煎其府藏醴醪煮其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一塗易竭之身而外內受敵身非木石其能久乎其自用甚者飲食不節以生百病好色不倦以致乏絶風寒所災百毒所傷中道夭於衆難世皆知笑悼謂之不善持生也至于措身失理亡之於微積微成損積損成衰從衰得白從白得老從老得終悶若無端中智以下謂之自然縱少覺悟咸歎恨於所遇之初而不知慎衆險於未兆是由桓侯抱將死之疾而怒扁鵲之先見以覺痛之日為受病之始也害成於微而救之於著故有無功之治馳騁常人之域故有一切之壽仰觀俯察莫不皆然以多自證以同自慰謂天地之理盡此而已矣縱聞養生之事則斷以所見謂之不然其次狐疑雖少庶幾莫知所由其次自力服藥半年一年勞而未驗志以厭衰中路復廢或益之以畎澮而泄之以尾閭欲坐望顯報者或抑情忍欲割棄榮願而嗜好常在耳目之前所希在數十年之後又恐兩失內懷猶豫心戰於內物誘於外交賒相傾如此復敗者夫至物微妙可以理知難以目識譬猶豫章生七年然後可覺耳今以躁競之心涉希靜之塗意速而事遲望近而應遠故莫能相終夫悠悠者既以未效不求而求者以不專喪業偏恃者以不兼無功追術者以小道自溺凡若此類故欲之者萬無一能成也善養生者則不然矣清虛靜泰少私寡欲知名位之傷德故忽而不營非欲而強禁也識厚味之害性故棄而弗顧非貪而後抑也外物以纍心不存神氣以醇白獨著曠然無憂患寂然無思慮又守之以一養之以和和理日濟同乎大順然後蒸以靈芝潤以醴泉晞以朝陽綏以五絃無為自得體妙心玄忘歡而後樂足遺生而後身存若此以往庶可與羡門比壽王喬爭年何為其無有哉
