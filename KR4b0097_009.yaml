body:
  text: 卷九答釋難宅無吉凶攝生論夫先王垂訓開制中人言之所樹賢愚不違事之所由古今不忒所以致教也若夫機神玄妙不言之化自非至精孰能與之故善求者觀物於微觸類而長不以己為度也按如所論甚有則愚甚無則誕今使小有便得不愚耶了無乃得離之也若小有則不愚吾未知小有其限所止也若了無乃得離之則甚無者無為謂之誕也又曰私神立則公神廢然則唯惡夫私之害公邪之傷正不為無神也向墨子立公神之情狀不甚有之說使董生託正忌之塗執不甚無之言二賢雅趣可得合而一兩無不失耶今之所辨欲求實有實無以明自然不詭持論有工拙議教有精粗也尋雅論之指謂河洛不誠借助鬼神故為之宗廟以神其本不答子貢以求其然則足下得不為託心無神鬼齊契於董生耶而復顧古人之言懼無鬼神之弊貌與情乖立從公廢私之論欲彌縫兩端使不愚不誕兩譏董墨謂其中央可得而居恐辭辨雖巧難可俱通又非所望於核論也故吾謂古人合德天地動應自然經世所立莫不有徵豈匿設宗廟以期後嗣空借鬼神以誷將來耶足下將謂吾與墨不殊今不辭同有鬼但不偏守一區明所當然使人鬼同謀幽明並濟亦所以求衷所以為異耳論曰聖人鈞疾而禱不同故於臣弟則周公請命親其身則尼父不禱所謂禮為情貌者也難曰若於臣子則宜修情貌未聞舜禹有請君父也若於身則否未聞武王閼禱之命也湯禱桑林復為君父耶推此而言宜以禱為益則湯周用之禱無所行則孔子不請此其殊塗同歸隨時之義也又曰時日先王所以誡不怠而勸從事足下前論云時日非盛王所有故吾問惟戊之事今不答惟戊果是非而曰所以誡勸此復兩許之言也縱令惟戊盡於誡勸尋論按名當言有日耶無日耶又曰俗之時日順妖忌而逆事理按此言以惡夫妖逆故去之未為盛王了無日也夫時日用於盛世而來代襲以妖惑猶先王制雅樂而季世繼以淫哇也今憤妖忌因欲去日何異惡鄭衛而滅韶武耶不思其本見其所弊輒疾而欲除得不為遇噎溺而遷怒耶足下既已善卜矣乾坤有六子支幹有剛柔統以陰陽錯以五行故吉凶可得而時日是其所由故古人順之焉有善其流而惡其源者吾未知其可也至於河洛宗廟則謂匿而不信類禡祈禱則謂僞而無實時日剛柔則謂假以為勸此聖人專造虛詐以欺天下匹夫之諒且猶恥之今議古人得無不可乃爾也凡此數事猶陷於誣妄冡宅之見伐不亦宜乎前論曰若許負之相條侯英布之黥而後王一欄之羊賓至而有死者皆性命之自然也今論曰隆準龍顏公侯之相不可假求此為相命自有一定相所當成人不能壞相所當敗智不能救陷當生於衆險雖可懼而無患抑當貴於廝養雖辱賤而必貴薄姬之困而後昌皆不可為不可求而暗自遇之全相之論必當若此乃一途得通本論不滯耳吾適以信順為難則便曰信順者成命之理必若所言命以信順成亦以不信順敗矣若命之成敗取足於信順故是吾前難壽夭成於愚智耳安得有性命自然也若信順果成相命請問亞夫由幾惡而得餓英布修何德以致王生羊積幾善以獲存死者負何罪以逢災耶既持相命復惜信順欲飾二論使得並通恐似矛楯無俱立之勢非辨言所能兩濟也論曰論相命當辨有無無疑衆寡苟一人有命則長平皆一矣又曰知命者不立巖牆之下吾謂知命者當無所不順乃畏巖牆知命有在立之何懼若巖牆果能為害不擇命之長短則知與不知立之有禍避之無患也則何知白起非長平之巖牆而云千萬皆命無疑衆寡耶若謂長平雖同於巖牆故是相命宜值之則命所當至期於必然不立之誡何所施耶若此果有相邪無相也此復吾之所疑也又曰長平不得係於命將係宅耶則唐虞之世宅何同吉吾本疑前論無非相命故借長平卒之異同以難相命之必然廣求異端以明事理豈必吉宅以質之耶又前論已明吉宅之不獨行今空抑此言欲以誰難又曰長平之卒宅何同凶苟泰同足以致則足下嫌多不愚於吾也適至守相便言千萬皆一校以至理負情之對於是乎見既虛立吉宅冀而無獲欲救相命而情以難顯故如此可謂善戰矣論曰卜之盡理所以成相命者也此復吾所疑矣前論以相命為主而尋益以信順此一離婁也今復以卜成之成命之具三而猶不知相命竟須幾箇為足也若唯信順於理尚少何以謂成命之理耶若是相濟則卜何所補於卜復曰成命耶請問卜之成命使單豹行卜知將有虎災則隱居深宮嚴備自衛若虎猶及之為卜無所益也若得無恙為相敗于卜何云成相耶若謂豹卜而得脫本無厄虎相也卜為妄語急在蠲除若謂凡有命皆當由卜乃成則世有終身不卜者皆失相夭命耶若謂卜亦相也然則卜是相中一物也安得云以成相耶若此不知卜筮故當與相命通相成為一不當各自行也論曰無故而居可占猶龍顏可相也設為吉宅而後居以幸福報無異假顏準而望公侯也然則人實徵宅非宅制人也按如所言無故而居可占者必謂當吉之人瞑目而前推遇任命以暗營宅自然遇吉也然則豈獨吉人凡有命者皆可以暗動而自得正是前論命有自然不可增減者也驟以可為之信順卜筮成不可增減之命矣奚獨禁可為之宅不盡相命唯有暗作乃是真宅耶若瞑目可以得相開目亦無所加也智者愈當識之周公營居何故躊躇於澗瀍問龜筮而食洛耶若龜筮果有助於為宅則知暗作可有不盡善之理矣苟暗作有不盡則不暗豈非求之術耶若必謂龜筮不能善相於暗往想亦不失相於考卜也則卜與不卜為與不為皆期於自得自得苟全則善占者所遇當識何得無故則能知有故則不知也今疾夫設為比之假顏貴夫無故謂之貞宅然貞宅之與設為其形不異同以功成俱是吉宅也但無故為設貞有故為設宅貞宅授吉於暗遇設為減福於用知爾然則吉凶之形果自有理可以有故而得故前論有占成之驗也然則占成之形何以言之必遠近得宜堂廉有制坦然殊觀可得而別利人以福故謂之吉害人以禍故謂之凶但公侯之相暗與吉會爾然則宅與性命雖各一物猶農夫良田合而成功也設公侯遷後方樂其吉而往居之吉宅豈選賢而後納擇善而後福哉苟宅無情於擇賢不惜吉於設為則屋不辭人田不讓耕其所以為吉凶薄厚何得不均前吉者不求而遇後聞吉而往同於居吉宅而有求與不求矣何言誕而不可為也由是言之非從人而徵宅亦成人明矣若挾顏狀則英布黥相不減其貴隆準見劓不減公侯是知顏準是公侯之摽識非所以為公侯也故標識者非公侯質也吉宅字與吉者宅實也善宅無吉徵而字吉宅以徵假見難可也若以非質之標識難有徵之吉宅此吾所不敢許也子陽無質而鏤其掌即知當字長耳巨君篡宅而運其魁既偏恃之禍非所以為難也至公侯之命稟之自然不可陶易宅是外物方圓由人有可為之理猶西施之潔不可為而西施之服可為也黼黻芳華所以助吉宅家所以成相故世無作人方而有卜宅說是以知人宅不可相喻也安得以不可作之人絶可作之宅耶至刑德皆同此自一家非本論占成居而得吉凶者也且先了此乃議其餘論曰獵夫從林所遇或禽或虎虎凶禽吉卜者筮而知之非能為安知所言地之善惡猶禽吉虎凶獵夫先筮故擇而從禽如擇居故避凶而從吉吉地雖不可為而可擇處猶禽虎雖不可變而可擇從苟卜筮所以成相虎可卜而地可擇何為半信而半不信耶又云地之吉凶有若禽虎不得宮姓則無害商則為災也案此為怪所不解而以為難似未察宮商之理也雖此地之吉而或長於養宮短於育商猶良田雖美而稼有所宜何以言之人姓有五音五行有相生故同姓不昏惡不殖也人誠有之地亦宜然故古人仰準陰陽俯協剛柔中識性理使三才相善同會於大通所以窮理而盡物宜也夫同聲相應同氣相求自然之分也音不和則比絃不動聲同則雖遠相應此事雖著而猶莫或識苟有五音各有宜土氣有相生則人宅猶禽虎之類豈可見宮商之不同而謂之地無吉凶也論曰天下或有能說之者子而不言誰與能之難曰足下前論以云有能占成居者此即能說之矣故吾曰天下當有能者今不求之於前論而復責吾難之於能言亦當知冡宅有吉凶也又曰藥之已病為一也實而宅之吉凶為一也誣既曰成居可占而復曰誣耶藥之已病其驗交見故君子信之宅之吉凶其報賒遙故君子疑之今若以交賒為虛實則恐所以求物之地鮮矣吾見溝澮不疑江海之大覩丘陵則知有泰山之高也若守藥則棄宅見交則非賒是海人所以終身無山山客白首無大魚也論曰智之所知未若所不知者衆此較通世之常滯然智所不知不可以妄求也難曰智所不知相必亦未知也今暗許便多於所知者何耶必生於本謂之無而強以驗有也強有之驗將不盈於數矣而并所成驗者謂之多於所知耳苟知然果有未還之理不因見求隱尋端究緒由而得卯未夫尋端之理猶獵師以得禽也縱使尋迹時有無獲然得禽曷嘗不由之哉今吉凶不先定則謂不可求何異獸不期則不敢舉足坐守無根也由此而言探賾索隱何謂為妄
